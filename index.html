
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TCM WuXing Pro</title>
    <meta name="theme-color" content="#7e22ce" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/tcm/192/192" />
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-tcm-light text-tcm-dark h-screen overflow-hidden print:h-auto print:overflow-visible">
    <div id="root" class="h-full print:h-auto"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
